name: grocery_mart
description: "Mini Shop grocery e-commerce application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management and navigation
  get: ^4.7.2

  # API
  http: ^1.5.0

  # Firebase authentication
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1

  # Images and fonts
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  google_fonts: ^6.3.0
  cloud_firestore: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/splash/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F6FCEA"
  image: "assets/icons/app_icon.png"

  android_12:
    color: "#F6FCEA"
    image: "assets/icons/app_icon.png"

  android: true
  ios: true
  web: false